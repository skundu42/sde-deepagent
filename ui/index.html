<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sde-deepagent · mission control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230a0f0c'/><rect x='3' y='3' width='10' height='10' fill='none' stroke='%232bd97c' stroke-width='1.5'/><rect x='6' y='6' width='4' height='4' fill='%232bd97c'/></svg>">
</head>
<body>
<div class="crt" aria-hidden="true"></div>

<aside class="sidebar">
  <a class="brand" href="#/">
    <span class="brand-glyph">▚▞</span>
    <span class="brand-name">SDE-DEEPAGENT<span class="cursor">█</span></span>
    <span class="brand-sub">// mission control</span>
  </a>

  <nav class="nav">
    <a href="#/" data-route="tasks"><span class="nav-pre">01</span> Tasks</a>
    <a href="#/new" data-route="new"><span class="nav-pre">02</span> New task</a>
    <a href="#/repos" data-route="repos"><span class="nav-pre">03</span> Codebases</a>
    <a href="#/agents" data-route="agents"><span class="nav-pre">04</span> Agents</a>
    <a href="#/chat" data-route="chat"><span class="nav-pre">05</span> Chat</a>
    <a href="#/resources" data-route="resources"><span class="nav-pre">06</span> Resources</a>
  </nav>

  <div class="side-stats" id="side-stats">
    <div class="side-stats-title">└─ system</div>
    <div class="stat-row"><span>queued</span><b id="st-queued">–</b></div>
    <div class="stat-row"><span>running</span><b id="st-running">–</b></div>
    <div class="stat-row"><span>completed</span><b id="st-completed">–</b></div>
    <div class="stat-row"><span>failed</span><b id="st-failed">–</b></div>
    <div class="stat-row"><span>memory</span><b id="st-memory">–</b></div>
    <div class="stat-row"><span>spend today</span><b id="st-spend">–</b></div>
    <div class="conn" id="conn"><i></i><span>link</span></div>
  </div>
</aside>

<main class="main" id="main">
  <div class="boot">booting<span class="cursor">█</span></div>
</main>

<div class="toast-stack" id="toasts"></div>

<script src="app.js"></script>
</body>
</html>
